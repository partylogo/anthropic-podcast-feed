name: Daily Podcast Scan

on:
  schedule:
    - cron: '0 23 * * *'   # 23:00 UTC = 07:00 Asia/Taipei
  workflow_dispatch:        # manual trigger via GitHub UI

permissions:
  contents: write           # needed to push commits back

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Scan podcast feeds
        run: npm run scan

      - name: Filter for Anthropic guests
        run: npm run filter

      - name: Commit changes
        run: |
          git config user.name "podcast-scan-bot"
          git config user.email "actions@github.com"
          git add data/episodes.jsonl data/episodes-curated.jsonl
          if git diff --staged --quiet; then
            echo "No new episodes today."
          else
            git commit -m "Daily scan: $(date -u +%Y-%m-%d)"
            git push
          fi
